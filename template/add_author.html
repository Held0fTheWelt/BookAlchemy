{% extends "base.html" %}

{% block title %}Add Author · BookAlchemy{% endblock %}

{% block content %}
  <div class="card panel">
    <div class="panel-head">
      <h2>Add an Author</h2>
      <div class="muted">Create an author profile to keep your library tidy.</div>
    </div>

    <form class="form" action="/add_author" method="POST">
      <div class="form-grid">
        <div class="control">
          <label for="name">Author name</label>
          <input type="text" id="name" name="name" placeholder="e.g. Ursula K. Le Guin" required />
        </div>

        <div class="control">
          <label for="birthdate">Birthdate</label>
          <input type="date" id="birthdate" name="birthdate" required />
        </div>

        <div class="control" style="grid-column: 1 / -1;">
          <label for="date_of_death">Date of death <span class="muted" style="font-weight: 650;">(optional)</span></label>
          <input type="date" id="date_of_death" name="date_of_death" />
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" type="submit">Add author</button>
        <a class="btn btn-ghost" href="{{ url_for('index') }}">Back to library</a>
      </div>
    </form>
  </div>
{% endblock %}
